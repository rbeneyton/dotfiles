# lock screen with wallpaper (theme.lua colors for the input field)

general {
    hide_cursor = true
}

background {
    monitor =
    path = {{trim (command_output "realpath ~")}}/.config/awesome/data/35471812.jpg
    blur_passes = 2
    # shown while the image loads / if it fails
    color = rgb(222222)
}

input-field {
    monitor =
    size = 300, 40
    fade_on_empty = false
    outline_thickness = 1
    inner_color = rgb(222222)
    outer_color = rgb(535d6c)
    font_color = rgb(ffffff)
    check_color = rgb(E5CFB5)
    fail_color = rgb(ff0000)
}
