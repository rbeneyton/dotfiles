# xset s {{awesome_xset_wait_period}} {{awesome_xset_burn_period}} + xss-lock/dim-screen.sh/slock equivalent

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# dim (light -O/-I save/restore, as dim-screen.sh did)
listener {
    timeout = {{awesome_xset_wait_period}}
    on-timeout = light -O && light -S 0
    on-resume = light -I
}

# lock
listener {
    timeout = {{awesome_xset_burn_period}}
    on-timeout = loginctl lock-session
}

# monitor off
listener {
    timeout = {{hyprland_dpms_off_period}}
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
