# hyprland configuration (awesome rc.lua translation)

# [[[ variables

$mod = SUPER
$menu = fuzzel
$home = {{trim (command_output "realpath ~")}}
# ~/bin is not on the GDM/Wayland session PATH, so exec the terminal by full path
$terminal = $home/bin/alacritty

env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = MOZ_ENABLE_WAYLAND,1

# ]]]
# [[[ monitors

# unknown/hotplugged monitors: preferred mode, auto-placed right of existing ones
monitor = , preferred, auto, 1

# workspace <-> monitor binding: tags 1-5 live on the laptop, 6-9 on the external.
# a workspace bound to an absent monitor falls back to eDP-1, so this stays sane
# with nothing plugged in. if the external uses a port other than HDMI-A-1 (e.g.
# DP-1 when docked), add/adjust the monitor name below (and in waybar config.jsonc).
# multi-monitor (tags 6-9 on the external) is gated on the laptop package; without
# it every tag stays on eDP-1.
workspace = 1, monitor:eDP-1, default:true, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true
workspace = 5, monitor:eDP-1, persistent:true
{{#if dotter.packages.laptop}}
workspace = 6, monitor:HDMI-A-1, default:true, persistent:true
workspace = 7, monitor:HDMI-A-1, persistent:true
workspace = 8, monitor:HDMI-A-1, persistent:true
workspace = 9, monitor:HDMI-A-1, persistent:true
{{else}}
workspace = 6, monitor:eDP-1, persistent:true
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
workspace = 9, monitor:eDP-1, persistent:true
{{/if}}

# ]]]
# [[[ input

input {
    # same keymap as X11 (xkb package), applied by the compositor to all
    # keyboards including hotplugged ones: no inputplug anymore
    kb_file = $home/.config/xkb/keymap/keymap.xkb

    # sloppy focus
    follow_mouse = 1
}

# ]]]
# [[[ look

general {
    layout = master

    # no useless gaps, as in awesome
    # gaps_in: gap between adjacent tiled windows
    gaps_in = 0
    # gaps_out: gap between windows and the monitor edges
    gaps_out = 0

    # window border width in px (theme.lua border_width)
    border_size = 1

    col.inactive_border = rgb(303640)
    col.active_border = rgb(E5CFB5)
}

master {
    # default orientation on every workspace: master window left, stack right
    # (awesome tile layout; mod+space still cycles orientations afterwards)
    orientation = left
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ]]]
# [[[ key bindings

# tag navigation (prev/next incl. empty workspaces, clamped to tags 1-9)
bind = $mod, Left, exec, $home/.config/hypr/workspace-step.sh -1
bind = $mod, I, exec, $home/.config/hypr/workspace-step.sh -1
bind = $mod, Right, exec, $home/.config/hypr/workspace-step.sh +1
bind = $mod, O, exec, $home/.config/hypr/workspace-step.sh +1
bind = $mod SHIFT, O, movewindow, mon:+1
bind = $mod, Escape, workspace, previous

# monitor focus (directional, works for any port/placement)
bind = $mod, U, focusmonitor, l
bind = $mod, P, focusmonitor, r

# client focus
bind = $mod, J, cyclenext
bind = $mod, K, cyclenext, prev
bind = $mod, Tab, focuscurrentorlast

# client swap
bind = $mod SHIFT, J, swapnext
bind = $mod SHIFT, K, swapnext, prev

# programs
bind = $mod, Return, exec, $terminal
bind = $mod CTRL, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exit
# launcher
bind = $mod, W, exec, $menu
# clipboard history (diodon popup equivalent)
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# layout: master width factor
binde = $mod, L, layoutmsg, mfact +0.05
binde = $mod, H, layoutmsg, mfact -0.05
# layout: number of masters
bind = $mod SHIFT, H, layoutmsg, addmaster
bind = $mod SHIFT, L, layoutmsg, removemaster
# no mod+ctrl+h/l (number of columns) equivalent in master layout
# layout switch: orientation cycle covers tile/tile.left/tile.bottom/tile.top
bind = $mod, space, layoutmsg, orientationnext
bind = $mod SHIFT, space, layoutmsg, orientationprev

# lock & shutdown
bind = $mod, BackSpace, exec, hyprlock
bind = $mod SHIFT, BackSpace, exec, kshutdown --hide-ui --shutdown

# audio control
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

{{#if dotter.packages.laptop}}
# light control
binde = , XF86MonBrightnessUp, exec, light -A 5
binde = , XF86MonBrightnessDown, exec, light -U 5
{{/if}}

# client state
bind = $mod, F, fullscreen, 0
bind = $mod, M, fullscreen, 1
bind = $mod, C, killactive
bind = $mod CTRL, space, togglefloating
bind = $mod CTRL, Return, layoutmsg, swapwithmaster
bind = $mod, T, pin
# magnifier approximation: float the active window centered above the tiling (toggle)
bind = $mod, G, exec, hyprctl --batch "dispatch togglefloating active; dispatch resizeactive exact 65% 65%; dispatch centerwindow"
# no minimize in hyprland: mod+n hides into 'min' special workspace,
# mod+a restores all hidden windows onto the current workspace (as in awesome)
bind = $mod, N, movetoworkspacesilent, special:min
bind = $mod, A, exec, $home/.config/hypr/restore-min.sh

# tags (keycodes as in awesome, to work on any keyboard layout)
bind = $mod, code:10, workspace, 1
bind = $mod, code:11, workspace, 2
bind = $mod, code:12, workspace, 3
bind = $mod, code:13, workspace, 4
bind = $mod, code:14, workspace, 5
bind = $mod, code:15, workspace, 6
bind = $mod, code:16, workspace, 7
bind = $mod, code:17, workspace, 8
bind = $mod, code:18, workspace, 9
bind = $mod SHIFT, code:10, movetoworkspace, 1
bind = $mod SHIFT, code:11, movetoworkspace, 2
bind = $mod SHIFT, code:12, movetoworkspace, 3
bind = $mod SHIFT, code:13, movetoworkspace, 4
bind = $mod SHIFT, code:14, movetoworkspace, 5
bind = $mod SHIFT, code:15, movetoworkspace, 6
bind = $mod SHIFT, code:16, movetoworkspace, 7
bind = $mod SHIFT, code:17, movetoworkspace, 8
bind = $mod SHIFT, code:18, movetoworkspace, 9
# no equivalent of awesome multi-tag view/toggle (mod+ctrl+N / mod+ctrl+shift+N)

# mouse (mod+left drag move, mod+right drag resize)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ]]]
# [[[ rules

# tag assignments (no switchtotag equivalent: window opens on its tag without view switch)
windowrule = match:class (?i)^(vlc)$, workspace 4
windowrule = match:class (?i)^(firefox)$, workspace 5
windowrule = match:class (?i)^(chromium)$, workspace 7
windowrule = match:class (?i)^(signal)$, workspace 8
windowrule = match:class (?i)^(sylpheed)$, workspace 9

# floating clients
windowrule = match:class (?i)^(arandr|gpick|sxiv|wpa_gui|veromix|xtightvncviewer|copyq)$, float true
windowrule = match:class ^(pinentry)(.*)$, float true
windowrule = match:title ^(Event Tester)$, float true

# ]]]
# [[[ startup

# hand the wayland socket to dbus activation, so xdg-desktop-portal-hyprland can
# start (a dead portal makes every gtk app stall ~10s at launch)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# wayland gtk apps (waybar tray icons) read the icon theme from gsettings,
# not from gtk-3.0/settings.ini (which only x11 apps honor)
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'breeze-dark'

exec-once = waybar
exec-once = mako
exec-once = hyprpaper

# dim the screen then lock (xset/xss-lock/dim-screen.sh/slock equivalent)
{{#if dotter.packages.noscreenlock}}
# no screen lock on this host
{{else}}
exec-once = hypridle
{{/if}}

# night
{{#if dotter.packages.redshift}}
exec-once = hyprsunset
{{/if}}

# network (short delay so waybar's tray is up before the item registers its icon)
exec-once = sleep 0.5 && nm-applet

# clipboard (diodon equivalent)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# sound
exec-once = pasystray
{{#if dotter.packages.bluetooth}}
exec-once = blueman-applet
{{/if}}

{{#if dotter.packages.thinkpad}}
# dirty "turn off all microphones at login"
exec-once = /bin/bash -c 'for i in $(pactl list sources | grep Name | grep __source | cut -d: -f2) ; do pactl set-source-mute $i "1" ; done'
{{/if}}

# ]]]

